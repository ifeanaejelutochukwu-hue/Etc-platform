server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All React routes → index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api → backend  (BACKEND_URL injected via envsubst or hardcoded)
    # For Railway we use the BACKEND_URL environment variable at runtime.
    # nginx doesn't support env vars natively; we use the entrypoint script.
    location /api {
        proxy_pass        $BACKEND_URL;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
    }

    # Proxy /ws → backend WebSocket
    location /ws {
        proxy_pass          $BACKEND_URL;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  86400;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
